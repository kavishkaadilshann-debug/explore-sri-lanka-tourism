<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - Explore Sri Lanka</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <header>
      <h1>Explore Sri Lanka</h1>
      <button
        class="menu-toggle"
        onclick="toggleMenu()"
        aria-label="Toggle navigation"
      >
        ☰
      </button>
      <nav id="nav-menu">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="destinations.html">Destinations</a>
        <a href="gallery.html">Gallery</a>
        <a href="travel-tips.html">Travel Tips</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </header>

    <section class="page-banner">
      <h2>Contact Us</h2>
      <p>Get in touch for any travel inquiries</p>
    </section>

    <main class="main-content">
      <form onsubmit="submitForm(event)">
        <label for="name" style="font-weight: 500; font-size: 0.9rem"
          >Your Name</label
        >
        <input type="text" id="name" placeholder="John Doe" required />

        <label for="email" style="font-weight: 500; font-size: 0.9rem"
          >Email Address</label
        >
        <input
          type="email"
          id="email"
          placeholder="example@mail.com"
          required
        />

        <label for="message" style="font-weight: 500; font-size: 0.9rem"
          >Message</label
        >
        <textarea
          id="message"
          rows="5"
          placeholder="Write your message here..."
          required
        ></textarea>

        <button type="submit">Send Message</button>

        <p
          id="contact-msg"
          style="
            margin-top: 15px;
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
            display: none;
          "
        ></p>
      </form>
    </main>

    <footer>
      <p>© 2026 Explore Sri Lanka. All Rights Reserved.</p>
    </footer>
  </body>
</html>
